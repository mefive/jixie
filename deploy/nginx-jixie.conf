# /etc/nginx/sites-available/<domain>  —  jixie: static SPA at / + API reverse-proxied to :3001.
# Copy, symlink into sites-enabled, `nginx -t && systemctl reload nginx`. certbot --nginx adds the 443
# server + the 80->443 redirect in place. bootstrap.sh renders the domain / port / paths from this.
server {
    listen 80;
    listen [::]:80;
    server_name jixie.example.com;

    # API → Hono on 127.0.0.1:3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A backtest / factor analysis / Agent LLM call can take a minute+ — don't cut the request off.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static SPA (Vite build). Client-side routing: unknown paths fall back to index.html.
    root /opt/jixie/apps/web/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets; never cache index.html (so a redeploy is picked up immediately).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
